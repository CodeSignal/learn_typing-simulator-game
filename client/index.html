<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Typing Simulator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Fonts (Work Sans) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Design System Foundations -->
  <link rel="stylesheet" href="./design-system/colors/colors.css">
  <link rel="stylesheet" href="./design-system/spacing/spacing.css">
  <link rel="stylesheet" href="./design-system/typography/typography.css">

  <!-- Design System Components -->
  <link rel="stylesheet" href="./design-system/components/button/button.css">
  <link rel="stylesheet" href="./design-system/components/boxes/boxes.css">
  <link rel="stylesheet" href="./design-system/components/input/input.css">
  <link rel="stylesheet" href="./design-system/components/dropdown/dropdown.css">
  <link rel="stylesheet" href="./design-system/components/tags/tags.css">
  <link rel="stylesheet" href="./design-system/components/modal/modal.css">

  <!-- Shared shell components (layout and utilities) -->
  <link rel="stylesheet" href="./app.css" />
  <link rel="stylesheet" href="./typing-simulator.css" />
</head>
<body class="bespoke">
  <!-- Navigation Header -->
  <header class="header">
    <h1>Typing Simulator</h1>
    <div class="spacer"></div>
    <button id="btn-help" class="button button-secondary" type="button">Help</button>
  </header>

  <!-- Main Application Content -->
  <main class="main-layout">
    <div class="content-area">
      <div class="typing-container">
        <!-- Racing Track Game -->
        <div id="racing-track-container" class="racing-track-container" style="display: none;">
          <div class="racing-track">
            <div class="racing-track-lane" data-lane="0">
              <div class="racing-car racing-car-player" id="car-player">
                <svg viewBox="0 0 40 40" width="40" height="40">
                  <rect x="5" y="10" width="30" height="20" rx="5" fill="#3B82F6"/>
                  <rect x="10" y="5" width="20" height="10" rx="3" fill="#2563EB"/>
                  <circle cx="12" cy="28" r="4" fill="#1E293B"/>
                  <circle cx="28" cy="28" r="4" fill="#1E293B"/>
                </svg>
              </div>
            </div>
            <div class="racing-track-lane" data-lane="1">
              <div class="racing-car racing-car-opponent" id="car-opponent-1">
                <svg viewBox="0 0 40 40" width="40" height="40">
                  <rect x="5" y="10" width="30" height="20" rx="5" fill="#EF4444"/>
                  <rect x="10" y="5" width="20" height="10" rx="3" fill="#DC2626"/>
                  <circle cx="12" cy="28" r="4" fill="#1E293B"/>
                  <circle cx="28" cy="28" r="4" fill="#1E293B"/>
                </svg>
              </div>
            </div>
            <div class="racing-track-lane" data-lane="2">
              <div class="racing-car racing-car-opponent" id="car-opponent-2">
                <svg viewBox="0 0 40 40" width="40" height="40">
                  <rect x="5" y="10" width="30" height="20" rx="5" fill="#10B981"/>
                  <rect x="10" y="5" width="20" height="10" rx="3" fill="#059669"/>
                  <circle cx="12" cy="28" r="4" fill="#1E293B"/>
                  <circle cx="28" cy="28" r="4" fill="#1E293B"/>
                </svg>
              </div>
            </div>
            <div class="racing-track-lane" data-lane="3">
              <div class="racing-car racing-car-opponent" id="car-opponent-3">
                <svg viewBox="0 0 40 40" width="40" height="40">
                  <rect x="5" y="10" width="30" height="20" rx="5" fill="#F59E0B"/>
                  <rect x="10" y="5" width="20" height="10" rx="3" fill="#D97706"/>
                  <circle cx="12" cy="28" r="4" fill="#1E293B"/>
                  <circle cx="28" cy="28" r="4" fill="#1E293B"/>
                </svg>
              </div>
            </div>
            <div class="racing-text-overlay">
              <div id="racing-typing-text" class="racing-typing-text"></div>
            </div>
            <div class="racing-finish-line" id="racing-finish-line"></div>
          </div>
        </div>
        <!-- Meteorite Rain Game -->
        <div id="meteorite-rain-container" class="meteorite-rain-container" style="display: none;">
          <div class="meteorite-rain-game">
            <div class="meteorite-rain-ui">
              <div class="meteorite-score" id="meteorite-score">0</div>
              <div class="meteorite-lives" id="meteorite-lives">
                <div class="meteorite-heart"></div>
                <div class="meteorite-heart"></div>
                <div class="meteorite-heart"></div>
              </div>
            </div>
            <div class="meteorite-start-message" id="meteorite-start-message">
              Press space to start
            </div>
            <div class="meteorite-rain-play-area" id="meteorite-play-area">
              <!-- Meteorites will be dynamically added here -->
            </div>
            <div class="meteorite-ground" id="meteorite-ground"></div>
            <div class="meteorite-typing-input-container">
              <input
                type="text"
                id="meteorite-typing-input"
                class="input"
                autocomplete="off"
                autocorrect="off"
                autocapitalize="off"
                spellcheck="false"
                placeholder=""
              />
            </div>
          </div>
        </div>
        <!-- Tower Defense Game -->
        <div id="tower-defense-container" class="tower-defense-container" style="display: none;">
          <div class="tower-defense-game">
            <div class="tower-defense-ui">
              <div class="td-lives" id="td-lives">Lives: 3</div>
              <div class="td-gold" id="td-gold">Gold: 1000</div>
              <div class="td-score" id="td-score">Score: 0</div>
              <div class="td-wave" id="td-wave">Wave: 0</div>
            </div>
            <div class="tower-defense-grid" id="tower-defense-grid">
              <!-- Grid cells will be dynamically created -->
            </div>
            <div class="tower-defense-word-display" id="tower-defense-word-display">
              <!-- Word will be displayed here -->
            </div>
          </div>
        </div>
        <!-- Classic Typing View (fallback for non-racing games) -->
        <div class="typing-text-container" id="classic-typing-container">
          <div id="typing-text" class="typing-text"></div>
        </div>
        <!-- Hidden input - must be outside containers to work in all game modes -->
        <textarea
          id="hidden-input"
          class="hidden-input"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
        ></textarea>
        <div id="completion-screen" class="completion-screen">
          <h2>Completed</h2>
          <p>Great job! You've finished typing the text.</p>
          <button id="btn-start-over" class="button button-primary">Start Over</button>
        </div>
        <div id="stats-dashboard" class="stats-dashboard">
          <div class="stats-dashboard-header">
            <h2>Typing Statistics</h2>
            <p class="stats-subtitle">Your performance summary</p>
          </div>
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-value-container">
                <span class="stat-value" id="stat-speed">0</span>
              </div>
              <div class="stat-label">WPM</div>
            </div>
            <div class="stat-card">
              <div class="stat-value-container">
                <span class="stat-value" id="stat-accuracy">0%</span>
              </div>
              <div class="stat-label">Accuracy</div>
            </div>
            <div class="stat-card">
              <div class="stat-value-container">
                <span class="stat-value" id="stat-time">0s</span>
              </div>
              <div class="stat-label">Total time</div>
            </div>
            <div class="stat-card">
              <div class="stat-value-container">
                <span class="stat-value" id="stat-errors">0</span>
              </div>
              <div class="stat-label">Total errors</div>
            </div>
            <div class="stat-card">
              <div class="stat-value-container">
                <span class="stat-value" id="stat-errors-left">0</span>
              </div>
              <div class="stat-label">Errors left</div>
            </div>
          </div>
          <div class="stats-dashboard-footer">
            <button id="btn-stats-start-over" class="button button-primary">Start Over</button>
          </div>
        </div>
        <div class="restart-button-container">
          <button id="btn-restart" class="button button-text" title="Start Over">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"></polyline>
              <polyline points="1 20 1 14 7 14"></polyline>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
            </svg>
          </button>
        </div>
        <div class="keyboard-stats-wrapper">
          <div id="realtime-stats-container" class="realtime-stats-container"></div>
          <div id="keyboard-container" class="keyboard-container"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- Core scripts -->
  <script type="module" src="./app.js"></script>
  <script src="./typing-simulator.js"></script>
</body>
</html>
